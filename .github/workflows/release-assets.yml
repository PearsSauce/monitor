name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and publish
        required: true
        default: v1.1.3

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build release files
        run: sh scripts/build-release.sh

      - name: Verify release asset set
        run: |
          set -eu
          expected='
          install-agent-linux.sh
          install-agent-windows.ps1
          install-server-linux.sh
          uninstall-agent-linux.sh
          uninstall-agent-windows.ps1
          uninstall-server-linux.sh
          vps-agent-linux-386
          vps-agent-linux-amd64
          vps-agent-linux-arm64
          vps-agent-linux-armv7
          vps-agent-windows-386.exe
          vps-agent-windows-amd64.exe
          vps-agent-windows-arm64.exe
          vps-server-linux-386
          vps-server-linux-amd64
          vps-server-linux-arm64
          vps-server-linux-armv7
          vps-server-windows-386.exe
          vps-server-windows-amd64.exe
          vps-server-windows-arm64.exe
          '
          find release -maxdepth 1 -type f -exec basename {} \; | sort > /tmp/release-assets.txt
          printf '%s\n' "$expected" | sed '/^[[:space:]]*$/d; s/^[[:space:]]*//' | sort > /tmp/expected-assets.txt
          diff -u /tmp/expected-assets.txt /tmp/release-assets.txt

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release/* --repo "$GITHUB_REPOSITORY" --clobber
